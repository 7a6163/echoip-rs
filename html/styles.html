<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-dim: #64748b;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --mono-bg: #f1f5f9;
    --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    --input-ring: rgba(37, 99, 235, 0.25);
    --badge-bg: #dbeafe;
    --badge-text: #1e40af;
    --pre-bg: #0f172a;
    --pre-text: #e2e8f0;
    --pre-border: #1e293b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #60a5fa;
      --accent-hover: #93bbfd;
      --mono-bg: #1e293b;
      --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
      --input-ring: rgba(96, 165, 250, 0.3);
      --badge-bg: #1e3a5f;
      --badge-text: #93c5fd;
      --pre-bg: #020617;
      --pre-text: #cbd5e1;
      --pre-border: #1e293b;
    }
  }

  html {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  code {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.875em;
    background: var(--mono-bg);
    padding: 0.1em 0.35em;
    border-radius: 4px;
  }

  pre code { background: none; padding: 0; }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 1.25rem 3rem;
  }

  /* Top bar */
  .topbar {
    background: var(--accent);
    height: 3px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .header-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: -0.01em;
  }

  .header-title span { color: var(--accent); }

  .header-links {
    display: flex;
    gap: 1.25rem;
    font-size: 0.85rem;
  }

  .header-links a { color: var(--text-dim); }
  .header-links a:hover { color: var(--accent); }

  /* Lookup card */
  .lookup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    padding: 2rem 2.5rem;
    text-align: center;
    margin-bottom: 2rem;
  }

  .lookup-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }

  .lookup-form {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .lookup-input {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--text);
    background: var(--mono-bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.75rem;
    text-align: center;
    width: 14ch;
    min-width: 10ch;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .lookup-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--input-ring);
  }

  .lookup-btn {
    font-size: 0.8rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .lookup-btn:hover { background: var(--accent-hover); }

  .lookup-btn-outline {
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent);
  }

  .lookup-btn-outline:hover {
    background: var(--accent);
    color: #fff;
  }

  .lookup-summary {
    margin-top: 0.75rem;
    font-size: 0.95rem;
    color: var(--text-dim);
  }

  .lookup-summary .badge {
    display: inline-block;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.15em 0.5em;
    border-radius: 4px;
    margin-left: 0.25rem;
    vertical-align: middle;
  }

  /* Two column layout */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
    align-items: start;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
  }

  .card-head {
    padding: 0.75rem 1.25rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .card-body { padding: 1rem 1.25rem; }

  /* Key-value table */
  .kv {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  .kv th, .kv td {
    padding: 0.4rem 0;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .kv tr:last-child th, .kv tr:last-child td { border-bottom: none; }

  .kv th {
    color: var(--text-dim);
    font-weight: 500;
    width: 40%;
    padding-right: 1rem;
  }

  .kv td {
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 0.8rem;
    word-break: break-all;
  }

  /* Map */
  .map-frame {
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  .map-frame iframe {
    display: block;
    width: 100%;
    height: 280px;
    border: none;
  }

  .map-note {
    padding: 0.5rem 1.25rem;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* API section */
  .api-section {
    margin-bottom: 2rem;
  }

  .api-section h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
  }

  .api-section h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .api-section p {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  .api-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }

  .api-table th {
    text-align: left;
    padding: 0.5rem 0.75rem 0.5rem 0;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
  }

  .api-table td {
    padding: 0.4rem 0.75rem 0.4rem 0;
    border-bottom: 1px solid var(--border);
  }

  .api-table tr:last-child td { border-bottom: none; }

  .hint-box {
    background: var(--mono-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin: 1rem 0;
    font-size: 0.85rem;
  }

  .hint-box ul {
    list-style: disc;
    padding-left: 1.25rem;
  }

  .hint-box li + li { margin-top: 0.35rem; }

  .json-pre {
    background: var(--pre-bg);
    color: var(--pre-text);
    border: 1px solid var(--pre-border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    overflow-x: auto;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 0.85rem;
    line-height: 1.5;
  }

  /* FAQ */
  .faq { margin-bottom: 2rem; }

  .faq h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
  }

  .faq details {
    border-bottom: 1px solid var(--border);
  }

  .faq details:first-of-type {
    border-top: 1px solid var(--border);
  }

  .faq summary {
    padding: 0.75rem 0;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    list-style: none;
  }

  .faq summary::-webkit-details-marker { display: none; }

  .faq summary::before {
    content: '+';
    display: inline-block;
    width: 1.25rem;
    font-weight: 400;
    color: var(--accent);
  }

  .faq details[open] summary::before { content: '\2212'; }

  .faq .faq-answer {
    padding: 0 0 0.75rem 1.25rem;
    font-size: 0.875rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* Footer */
  .site-footer {
    padding: 1.25rem 0;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
    text-align: center;
  }

  .site-footer a { color: var(--text-dim); text-decoration: underline; }
  .site-footer a:hover { color: var(--accent); }

  /* Responsive */
  @media (max-width: 700px) {
    .columns { grid-template-columns: 1fr; }
    .lookup-input { font-size: 1.4rem; width: 100%; }
    .lookup-card { padding: 1.5rem 1rem; }
    .header { flex-direction: column; gap: 0.5rem; }
  }
</style>
